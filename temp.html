<!DOCTYPE html>
<html>
    <head>
        <title>temp</title>
        <style>
            .container{
                display: grid ;
                grid-template-rows: 100px;
                grid-template-columns: repeat(3, 100px);
                gap: 10px;
            }
            .item{
                background-color: white;
                border: 2px solid black;
                text-align: center;
                line-height: 100px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="item item1">1</div>
            <div class="item item2">2</div>
            <div class="item item3">3</div>
        </div>
    </body>
    <footer>

    </footer>
</html>
